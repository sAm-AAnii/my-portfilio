<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Anif Amin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 30%, #3a3a3a 60%, #1a1a1a 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #3a3a3a, #1a1a1a); }
            25% { background-position: 50% 50%; background: linear-gradient(135deg, #1a1a1a, #2a2a2a, #c0c0c0, #2a2a2a); }
            50% { background-position: 100% 50%; background: linear-gradient(135deg, #0a0a0a, #3a3a3a, #e0e0e0, #1a1a1a); }
            75% { background-position: 50% 50%; background: linear-gradient(135deg, #1a1a1a, #2a2a2a, #c0c0c0, #2a2a2a); }
            100% { background-position: 0% 50%; background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #3a3a3a, #1a1a1a); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .back-btn {
            display: inline-block;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #c0c0c0;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: all 0.3s;
            border: 1px solid rgba(192,192,192,0.3);
            font-size: 1rem;
            font-weight: bold;
        }
        
        .back-btn:hover { 
            background: rgba(192,192,192,0.2); 
            color: white; 
            transform: translateX(-5px);
        }
        
        h1 { font-size: 2.8rem; margin-bottom: 0.5rem; color: #c0c0c0; }
        .subtitle { color: #87CEEB; margin-bottom: 3rem; font-size: 1.1rem; }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }
        .contact-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(192,192,192,0.2);
        }
        .contact-card:hover {
            transform: translateY(-10px);
            border-color: #c0c0c0;
            box-shadow: 0 10px 30px rgba(192,192,192,0.2);
        }
        .contact-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .contact-card h3 { color: #c0c0c0; margin-bottom: 0.8rem; font-size: 1.5rem; }
        .contact-card p { color: #aaa; word-break: break-all; font-size: 1rem; margin-bottom: 1rem; }
        .contact-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: rgba(192,192,192,0.15);
            color: #c0c0c0;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .contact-link:hover { 
            background: #c0c0c0; 
            color: black; 
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            h1 { font-size: 2rem; }
            .contact-card h3 { font-size: 1.2rem; }
            .contact-icon { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>📞 Contact Me</h1>
        <p class="subtitle">Let's connect! Reach out to me through any of these platforms</p>

        <div class="contact-grid">
            <div class="contact-card">
                <div class="contact-icon">📧</div>
                <h3>Email</h3>
                <p>anifamin01@gmail.com</p>
                <a href="mailto:anifamin01@gmail.com" class="contact-link">Send Email →</a>
            </div>

            <div class="contact-card">
                <div class="contact-icon">💼</div>
                <h3>LinkedIn</h3>
                <p>Anif Amin</p>
                <a href="https://www.linkedin.com/in/anif-amin-2643l2972/" class="contact-link" target="_blank">Connect on LinkedIn →</a>
            </div>

            <div class="contact-card">
                <div class="contact-icon">🐙</div>
                <h3>GitHub</h3>
                <p>sAm-AAnii</p>
                <a href="https://github.com/sAm-AAnii" class="contact-link" target="_blank">Follow on GitHub →</a>
            </div>
        </div>
    </div>
</body>
</html>
